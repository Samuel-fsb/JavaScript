        function EsquentarAgua(){
            return new Promise(resolve => {
                console.log("Iniciando a esquentar água...");
                setTimeout(() => resolve ("água quente!☕"), 2000);
            });
        };      

        function TorrarPao(){
            return new Promise(resolve => {
                console.log("Iniciando: Torrar pão...");
                setTimeout(() => resolve ("Torrada crocante! 🍞"), 2000)
            });
        };

        const PrepararCafeDaManha = async () => {
            const PromesaAgua = EsquentarAgua();
            const PromessaPao = TorrarPao();

            const ResultadoAgua = await PromesaAgua;
            const ResultadoPao = await PromessaPao;

            console.log(`Café da manhã pronto: ${ResultadoAgua} e ${ResultadoPao}`);

<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imutabilidade</title>
</head>
<body>

    <script>
       const ShoppingCart = {
        user: { id: 1, firstName: 'Jonh', lastName: 'noe'},

        Items: [
        {product: { id: 1, name: 'banana'}, quantity: 10},
        {product: { id: 2, name: 'maçã'}, quantity: 1}
        ]
       };

       function FormatShoppingCart(ShoppingCart){
        const Result = {
            user: {
                id: ShoppingCart.user,
                name: `${ShoppingCart.user.firstName} ${ShoppingCart.user.lastName}`,
            }
        };

        ShoppingCart.items.forEach((item) => {
            item.product = {id: item.product.id}
        });
        
        return Result;
       };
 
       console.log(FormatShoppingCart(ShoppingCart));
       console.log(ShoppingCart);



    </script>
</body>
</html>
